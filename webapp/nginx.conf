# jonasal/nginx-certbot handles the HTTP server block and ACME challenge automatically.
# Only the HTTPS server block is needed here.
server {
    listen 443 ssl;
    server_name DEPLOY_HOST_PLACEHOLDER;

    ssl_certificate     /etc/letsencrypt/live/DEPLOY_HOST_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DEPLOY_HOST_PLACEHOLDER/privkey.pem;
    ssl_dhparam         /etc/letsencrypt/dhparams/dhparam.pem;

    root  /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass            http://users:3000;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
    }

    location /game/ {
        proxy_pass            http://users:3000;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
    }

     location = /grafana {
           return 301 $scheme://$host/grafana/;
        }

        location /grafana/ {
           proxy_pass            http://grafana:3000;
           proxy_set_header      Host $host;
           proxy_set_header      X-Real-IP $remote_addr;
           proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_set_header      X-Forwarded-Proto $scheme;

           proxy_http_version    1.1;
           proxy_set_header      Upgrade $http_upgrade;
           proxy_set_header      Connection $connection_upgrade;
        }

    location = /play {
        proxy_pass            http://users:3000/play;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
    }

    location /api-docs {
        proxy_pass http://users:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
